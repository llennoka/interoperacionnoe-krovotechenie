<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценка риска кровотечения</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#2563eb;--primary-hover:#1d4ed8;--bg-color:#f3f4f6;--card-bg:#ffffff;--text-main:#111827;--text-muted:#4b5563;--border-color:#d1d5db;--green:#10b981;--yellow:#f59e0b;--red:#ef4444}
        body{font-family:'Inter',sans-serif;background-color:var(--bg-color);color:var(--text-main);line-height:1.5;margin:0;padding:20px}
        .container{max-width:760px;margin:0 auto;background:var(--card-bg);padding:32px;border-radius:12px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h2{font-size:24px;font-weight:700;margin:0 0 24px;padding-bottom:16px;border-bottom:2px solid var(--bg-color)}
        .section{margin-bottom:32px;padding:24px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
        .field{display:flex;flex-direction:column;gap:6px}
        .field.full{grid-column:1/-1}
        label{font-size:14px;font-weight:600;color:var(--text-muted)}
        input,select{padding:10px 12px;border:1px solid var(--border-color);border-radius:6px;font-family:inherit;font-size:14px;width:100%;box-sizing:border-box}
        input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
        .btn-group{display:flex;gap:12px;margin-top:24px}
        button{flex:1;padding:14px 24px;font-size:16px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all .2s;color:#fff}
        .btn-primary{background:var(--primary)} .btn-primary:hover{background:var(--primary-hover)}
        .btn-secondary{background:#e5e7eb;color:#374151} .btn-secondary:hover{background:#d1d5db}
        #result-screen{display:none}
        .result-card{border-radius:12px;padding:32px;margin-bottom:24px;border-left:8px solid;background:#fff;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        .risk-low{border-color:var(--green);background:#ecfdf5} .risk-mod{border-color:var(--yellow);background:#fffbeb} .risk-high{border-color:var(--red);background:#fef2f2}
        ul{margin:0;padding-left:20px;font-size:15px;margin-top:8px}
        li{margin-bottom:6px}
    </style>
</head>
<body>
<div class="container">
    <h2 id="main-title">Оценка риска интраоперационного кровотечения</h2>
    
    <div id="form-screen">
        <div class="section">
            <div class="grid">
                <div class="field full"><label>Предыдущие операции на органах брюшной полости</label>
                    <select class="main-select" data-label="Предыдущие операции">
                        <option value="0|Нет">Нет</option><option value="1|1 операция">1 операция</option><option value="2|2–3 операции">2–3 операции</option><option value="3|>3 операций">>3 операций</option>
                    </select>
                </div>
                <div class="field full"><label>Приём препаратов, влияющих на гемостаз</label>
                    <select class="main-select" data-label="Препараты">
                        <option value="0|Не принимает">Не принимает</option><option value="1|Антиагреганты">Антиагреганты</option><option value="2|Антикоагулянты">Антикоагулянты</option><option value="3|Комбинированная терапия">Комбинированная терапия</option>
                    </select>
                </div>
                <div class="field"><label>Тип вмешательства</label>
                    <select class="main-select" data-label="Вмешательство">
                        <option value="0|Лапароскопия">Лапароскопия</option><option value="1|Мини-лапаротомия">Мини-лапаротомия</option><option value="2|Лапаротомия">Лапаротомия</option><option value="3|Обширная/комбинированная">Обширная операция</option>
                    </select>
                </div>
                <div class="field"><label>Васкуляризация зоны</label>
                    <select class="main-select" data-label="Васкуляризация">
                        <option value="0|Низкая">Низкая</option><option value="1|Умеренная">Умеренная</option><option value="2|Высокая">Высокая</option><option value="3|Очень высокая (печень/селезёнка)">Очень высокая</option>
                    </select>
                </div>
                <div class="field"><label>МНО</label>
                    <select class="hemo-select" data-label="МНО">
                        <option value="0|≤ 1,2">≤ 1,2</option><option value="1|1,21–1,4">1,21–1,4</option><option value="2|1,41–2,0">1,41–2,0</option><option value="3|> 2,0">> 2,0</option>
                    </select>
                </div>
                <div class="field"><label>АЧТВ (сек)</label>
                    <select class="hemo-select" data-label="АЧТВ">
                        <option value="0|24-35 сек">24-35 сек</option><option value="1|36-45 сек">36-45 сек</option><option value="2|46-60 сек">46-60 сек</option><option value="3|>60 сек">>60 сек</option>
                    </select>
                </div>
                <div class="field"><label>Тромбоциты (×10⁹/л)</label>
                    <select class="hemo-select" data-label="Тромбоциты">
                        <option value="0|≥ 150">≥ 150</option><option value="1|100–149">100–149</option><option value="2|50–99">50–99</option><option value="3|<50"><50</option>
                    </select>
                </div>
                <div class="field"><label>Фибриноген (г/л)</label>
                    <select class="hemo-select" data-label="Фибриноген">
                        <option value="0|2,0–4,0">2,0–4,0</option><option value="1|4,1–5,0">4,1–5,0</option><option value="2|> 5,0 или 1,5–1,9">> 5,0 или 1,5–1,9</option><option value="3|< 1,5">< 1,5</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-primary" onclick="calculateRisk()">Рассчитать риск</button>
        </div>
    </div>

    <div id="result-screen">
        <div class="result-card" id="res_card">
            <h3 id="res_title" style="margin-top:0; margin-bottom:16px;"></h3>
            
            <div style="font-size:18px; margin-bottom:20px;">
                Суммарный балл: <strong id="out_score"></strong>
            </div>

            <div id="factors-container" style="margin-bottom: 20px;">
                <strong>Выявленные факторы:</strong>
                <ul id="out_factors"></ul>
            </div>

            <div>
                <strong>Клиническая интерпретация:</strong>
                <p id="out_interp" style="margin-top: 8px;"></p>
            </div>
        </div>
        
        <div class="btn-group">
            <button type="button" class="btn-secondary" onclick="window.print()">Распечатать</button>
            <button type="button" class="btn-primary" onclick="location.reload()">Новый расчет</button>
        </div>
    </div>
</div>

<script>
    function calculateRisk() {
        let mainScore = 0;
        let hemoScores = [];
        let riskFactors = [];

        document.querySelectorAll('.main-select').forEach(select => {
            let parts = select.value.split('|');
            let pts = parseInt(parts[0]);
            if (pts > 0) {
                mainScore += pts;
                riskFactors.push(`${select.dataset.label}: ${parts[1]}`);
            }
        });

        let maxHemoLabel = "";
        let maxHemoVal = "";
        
        document.querySelectorAll('.hemo-select').forEach(select => {
            let parts = select.value.split('|');
            let pts = parseInt(parts[0]);
            hemoScores.push(pts);
            
            if (pts === Math.max(...hemoScores) && pts > 0) {
                maxHemoLabel = select.dataset.label;
                maxHemoVal = parts[1];
            }
        });

        let maxHemoScore = Math.max(...hemoScores);
        
        if (maxHemoScore > 0) {
            riskFactors.push(`Показатель гемостаза -> ${maxHemoLabel}: ${maxHemoVal}`);
        }

        let totalScore = mainScore + maxHemoScore;
        let cardClass = "";
        let titleText = "";
        let interpText = "";

        if (totalScore >= 11) {
            cardClass = "risk-high";
            titleText = "🔴 Высокий риск";
            interpText = "Высокая вероятность значимого интраоперационного кровотечения.";
        } else if (totalScore >= 6) {
            cardClass = "risk-mod";
            titleText = "🟡 Умеренный риск";
            interpText = "Повышенная вероятность кровотечения, требуется усиленный контроль гемостаза.";
        } else {
            cardClass = "risk-low";
            titleText = "🟢 Низкий риск";
            interpText = "Вероятность клинически значимого интраоперационного кровотечения минимальна.";
        }

        document.getElementById('out_score').innerText = totalScore;
        
        let resCard = document.getElementById('res_card');
        resCard.className = "result-card " + cardClass;
        document.getElementById('res_title').innerText = titleText;
        document.getElementById('out_interp').innerText = interpText;

        let fBox = document.getElementById('factors-container');
        let fList = document.getElementById('out_factors');
        fList.innerHTML = "";
        
        if (riskFactors.length > 0) {
            fBox.style.display = 'block';
            riskFactors.forEach(f => {
                let li = document.createElement('li');
                li.innerHTML = f;
                fList.appendChild(li);
            });
        } else {
            fBox.style.display = 'none';
        }

        let rowData = [
            "-",
            "-",
            "-",
            totalScore,
            titleText,
            riskFactors.join(" | ")
        ];

        let formData = new FormData();
        formData.append("sheetName", "Интероперационное кровотечение");
        formData.append("data", JSON.stringify(rowData));

        fetch("https://script.google.com/macros/s/AKfycby3oLTKfR-6hKtQ1pmSSARXTiVvm_IbhSpp2nM52A5C0z_cXw9oNn09GbztTGFMrlF8/exec", {
            method: "POST",
            mode: "no-cors",
            body: formData
        });

        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('main-title').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
